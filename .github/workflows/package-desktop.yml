name: Package desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          EXPECTED="v$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "$EXPECTED" || {
            echo "Tag $GITHUB_REF_NAME does not match package version $EXPECTED" >&2
            exit 1
          }
      - run: npm ci
      - run: npm run gate
      - run: npm audit --audit-level=high
      - name: Scan committed source for secrets
        uses: gitleaks/gitleaks-action@961680e5305a30eb575f3ddf6bb6b2e265b68f0a # main, Node 24
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package:
    name: ${{ matrix.label }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            label: Windows x64
            args: --win --x64
            artifact: Kyrei-Windows-x64
            files: |
              dist/app/*.exe
              dist/app/*.blockmap
              dist/app/latest.yml
          - os: macos-15
            label: macOS x64 and Apple Silicon
            args: --mac --x64 --arm64
            artifact: Kyrei-macOS
            files: |
              dist/app/*.dmg
              dist/app/*.zip
              dist/app/*.blockmap
              dist/app/latest-mac.yml
          - os: ubuntu-24.04
            label: Linux and Arch x64
            args: --linux AppImage deb pacman --x64
            artifact: Kyrei-Linux-x64
            files: |
              dist/app/*.AppImage
              dist/app/*.deb
              dist/app/*.pkg.tar.zst
              dist/app/*.pacman
              dist/app/latest-linux.yml
          - os: ubuntu-24.04-arm
            label: Linux arm64
            args: --linux AppImage deb --arm64
            artifact: Kyrei-Linux-arm64
            files: |
              dist/app/*.AppImage
              dist/app/*.deb
              dist/app/latest-linux-arm64.yml
    runs-on: ${{ matrix.os }}
    env:
      # Release artifacts remain unsigned until platform signing credentials
      # are configured in GitHub Actions secrets.
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
      - name: Install Linux packaging tools
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libarchive-tools libopenjp2-tools
      - run: npm ci
      - name: Build ${{ matrix.label }} packages
        run: node scripts/package-electron.mjs ${{ matrix.args }} --publish never
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: Kyrei-*
          path: release-assets
          merge-multiple: true
      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          find release-assets -maxdepth 1 -type f ! -name SHA256SUMS.txt -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's#release-assets/##' \
            > release-assets/SHA256SUMS.txt
      - name: Create or update release
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES="docs/releases/${TAG}.md"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            if [[ -f "$NOTES" ]]; then
              gh release create "$TAG" --verify-tag --draft --title "Kyrei ${TAG}" --notes-file "$NOTES"
            else
              gh release create "$TAG" --verify-tag --draft --title "Kyrei ${TAG}" --generate-notes
            fi
          fi

          gh release upload "$TAG" release-assets/* --clobber
          gh release edit "$TAG" --draft=false --prerelease=false --latest
